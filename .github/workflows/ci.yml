name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build, vet, fmt, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./...

  e2e:
    name: SQL end-to-end (haybarn)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      # uv provides the haybarn-unittest tool installer.
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install haybarn-unittest
        run: |
          uv tool install haybarn-unittest
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: SQL end-to-end
        run: make test-sql
