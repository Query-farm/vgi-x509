name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build, vet, fmt, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./...

  # Resolve the latest published haybarn release once, so the E2E job always
  # tests the current version (and we never hardcode/pin it).
  resolve-haybarn:
    name: Resolve haybarn release
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.r.outputs.release }}
    steps:
      - id: r
        run: |
          REL=$(gh release view --repo Query-farm-haybarn/haybarn --json tagName --jq .tagName)
          echo "release=$REL" >> "$GITHUB_OUTPUT"
          echo "Latest haybarn release: $REL"
        env:
          GH_TOKEN: ${{ github.token }}

  # SQL end-to-end: run the sqllogictest suite (test/sql/*.test) against the
  # built Go worker through the real signed `vgi` community DuckDB extension via
  # a prebuilt standalone `haybarn-unittest` — no C++ build. See ci/README.md.
  #
  # Transport matrix: the same suite runs over each transport the vgi extension
  # supports, selected by ci/run-integration.sh's TRANSPORT env var (which
  # changes what the .test files ATTACH as the worker LOCATION):
  #   subprocess  worker spawned over stdio (the binary path)
  #   http        worker started with --http, LOCATION = http://127.0.0.1:<port>
  #   unix        worker started with --unix <sock>, LOCATION = unix://<sock>
  # The mock TLS server is started for ALL transports (tls_inspect still dials
  # it). See ci/README.md for the per-transport notes.
  integration:
    name: SQL E2E (${{ matrix.transport }})
    needs: resolve-haybarn
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        transport: [subprocess, http, unix]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build the worker
        run: go build -o vgi-x509-worker ./cmd/vgi-x509-worker

      - name: Download haybarn-unittest
        run: |
          gh release download "$HAYBARN_RELEASE" \
            --repo Query-farm-haybarn/haybarn \
            --pattern 'haybarn_unittest-linux-amd64.zip' \
            --output haybarn-unittest.zip --clobber
          mkdir -p hb && unzip -o -q haybarn-unittest.zip -d hb
        env:
          GH_TOKEN: ${{ github.token }}
          HAYBARN_RELEASE: ${{ needs.resolve-haybarn.outputs.release }}

      - name: Resolve runner + worker paths
        run: |
          # Absolute paths: run-integration.sh cd's into a staging dir before
          # invoking the runner, so relative paths would not resolve.
          UNITTEST="$PWD/$(find hb -name 'haybarn-unittest' -type f | head -1)"
          chmod +x "$UNITTEST"
          echo "HAYBARN_UNITTEST=$UNITTEST" >> "$GITHUB_ENV"
          echo "VGI_X509_WORKER=$PWD/vgi-x509-worker" >> "$GITHUB_ENV"

      - name: Run extension integration suite (${{ matrix.transport }})
        run: ci/run-integration.sh
        env:
          TRANSPORT: ${{ matrix.transport }}
